spring:
  application:
    name: findex
  profiles:
    active: dev   # dev, prod 선택 가능
  config:
    import: application-secret.yaml

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

# Swagger
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true

logging:
  level:
    org.hibernate.SQL: off
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"